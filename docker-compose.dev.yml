# Локальная разработка: bind-mount ./backend, API с --reload.
# Запуск: make dev-up  (нужен .env.dev — скопируйте из .env.example)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: payment_backend:latest

  db:
    image: postgres:16-alpine
    env_file:
      - .env.dev
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$DB_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: payment_backend:latest
    working_dir: /app
    volumes:
      - ./backend:/app
    env_file:
      - .env.dev
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD", "python", "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs')",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 90s

  consumer:
    image: payment_backend:latest
    working_dir: /app
    volumes:
      - ./backend:/app
    env_file:
      - .env.dev
    command: payment-consumer
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      app:
        condition: service_healthy

volumes:
  postgres_data:
