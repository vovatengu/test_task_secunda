# Локальная разработка: bind-mount ./backend, API с --reload.
# Запуск: make dev-up  (нужен .env.dev — скопируйте из .env.example)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: payment_backend:latest

  app:
    image: payment_backend:latest
    working_dir: /app
    depends_on:
      - db
      - rabbitmq
    volumes:
      - ./backend:/app
    env_file:
      - .env.dev
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  consumer:
    image: payment_backend:latest
    working_dir: /app
    depends_on:
      - db
      - rabbitmq
    volumes:
      - ./backend:/app
    env_file:
      - .env.dev
    command: payment-consumer

  db:
    image: postgres:16-alpine
    env_file:
      - .env.dev
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always

volumes:
  postgres_data:
