# Интеграционные тесты / CI: отдельная БД, alembic при старте app.
# Запуск: make test-up  (нужен .env.test — скопируйте из .env.example)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: payment_backend:test

  app:
    image: payment_backend:test
    working_dir: /app
    depends_on:
      - db
      - rabbitmq
    volumes:
      - ./backend:/app
    env_file:
      - .env.test
    ports:
      - "8000:8000"
    command: bash -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  consumer:
    image: payment_backend:test
    working_dir: /app
    depends_on:
      - db
      - rabbitmq
    volumes:
      - ./backend:/app
    env_file:
      - .env.test
    command: payment-consumer

  db:
    image: postgres:16-alpine
    env_file:
      - .env.test
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    restart: always

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: always

volumes:
  postgres_test_data:
